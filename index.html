
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan's Klusjes & Oppasservice Tervuren</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #00a8ff, #0077c2);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        header h1 { margin: 0; font-size: 2.5em; }
        header p { margin: 10px 0 0; font-size: 1.2em; font-style: italic; }
        
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h2 { color: #0077c2; border-bottom: 2px solid #00a8ff; padding-bottom: 5px; }
        
        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .service-card {
            background: #eef7fc;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid #00a8ff;
        }
        .service-card h3 { margin: 0 0 10px 0; color: #333; }
        .price { font-weight: bold; color: #0077c2; font-size: 1.1em; }
        
        form {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label { font-weight: bold; }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }
        button {
            background-color: #00a8ff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0077c2; }
    </style>
</head>
<body>

<header>
    <h1>Dylan's Klusjes & Oppasservice</h1>
    <p>Betrouwbare hulp in de buurt van de Rozendalstraat, Tervuren!</p>
</header>

<div class="container">
    <h2>Mijn Diensten (NL / EN / FR)</h2>
    <div class="services">
        <div class="service-card">
            <h3>🐾 Huizen & Dieren</h3>
            <p class="price">€12,50 / dag</p>
        </div>
        <div class="service-card">
            <h3>🦮 Honden Uitlaten</h3>
            <p class="price">€5,50 / keer</p>
        </div>
        <div class="service-card">
            <h3>🏡 Tuin & Stoep</h3>
            <p class="price">€12,50 / uur</p>
        </div>
    </div>

    <h2>Direct een Klus Boeken of Info Vragen</h2>
    
    <form action="https://formspree.io/f/xykaadpg" method="POST">
        <label for="naam">Uw Naam / Your Name:</label>
        <input type="text" id="naam" name="naam" required placeholder="Bijv. Familie Janssen / Smith">

        <label for="telefoon">Uw Telefoonnummer / Phone number:</label>
        <input type="tel" id="telefoon" name="telefoon" required placeholder="Bijv. 0412 34 56 78">

        <label for="dienst">Wat heeft u nodig? / Service:</label>
        <select id="dienst" name="dienst">
            <option>Huizen & Dierenoppas (€12,50/dag)</option>
            <option>Honden uitlaatservice (€5,50/keer)</option>
            <option>Tuinen & stoepen netjes maken (€12,50/uur)</option>
            <option>Iets anders / Other</option>
        </select>

        <label for="bericht">Bericht / Message:</label>
        <textarea id="bericht" name="bericht" rows="4" placeholder="Wanneer gaat u op vakantie? En wat zijn de details?" required></textarea>

        <button type="submit">Verstuur Aanvraag 💸</button>
    </form>
</div>

</body>
</html>
